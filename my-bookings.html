<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partner Access | Imagine Davao</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="account.css" />
</head>
<body>
  <main class="shell">
    <header class="head">
      <a class="brand" href="/">
        <span class="kicker">Imagine</span>
        <span class="city">Davao</span>
      </a>
      <div class="head-actions">
        <nav class="head-nav">
          <a href="/">Home</a>
          <a href="booking">Book</a>
          <a href="account">Account</a>
        </nav>
        <div class="auth-corner" aria-label="Authentication links">
          <a class="auth-corner-link" href="signin">Login</a>
          <a class="auth-corner-link" href="signin?mode=signup">Sign Up</a>
        </div>
      </div>
    </header>

    <section class="panel">
      <h1>Partner Portal Notice</h1>
      <p class="muted">Traveler booking history and level tracking are no longer part of Imagine Davao accounts.</p>
      <div class="card">
        <p>Use the partner account page to manage business listing details and promotion requests.</p>
        <a class="btn block-link" href="account">Open Partner Account</a>
      </div>
    </section>
  </main>

  <script src="api-client.js"></script>
</body>
</html>
