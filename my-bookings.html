<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Bookings | ImaginePhilippines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="account.css" />
</head>
<body>
  <main class="shell">
    <header class="head">
      <a class="brand" href="index.html">
        <span class="kicker">Imagine</span>
        <span class="city">Davao</span>
      </a>
      <div class="head-actions">
        <nav class="head-nav">
          <a href="index.html">Home</a>
          <a href="booking.html">Book</a>
          <a href="account.html">Account</a>
        </nav>
        <div class="auth-corner" aria-label="Authentication links">
          <a class="auth-corner-link" href="signin.html">Login</a>
          <a class="auth-corner-link" href="signin.html?mode=signup">Sign Up</a>
        </div>
      </div>
    </header>

    <section class="panel">
      <h1>Booking History</h1>
      <p class="muted" id="bookingsSub">Sign in to view your booking history and level progress.</p>
      <div class="card">
        <p class="level-value" id="bookingsLevel">Level 1</p>
        <p class="muted" id="bookingsCount">0 bookings</p>
        <div class="progress"><div class="progress-fill" id="bookingsProgress"></div></div>
        <p class="muted" id="bookingsNext">Next level at 5 bookings.</p>
      </div>
    </section>

    <section class="panel">
      <h2>Recent Bookings</h2>
      <div id="bookingsGrid" class="grid"></div>
      <p class="status" id="bookingsStatus" aria-live="polite"></p>
    </section>
  </main>

  <script src="api-client.js"></script>
  <script src="my-bookings.js"></script>
</body>
</html>
