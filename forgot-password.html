<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | ImaginePhilippines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="account.css" />
</head>
<body>
  <a class="skip-link" href="#authMain">Skip to main content</a>
  <main class="shell shell-narrow" id="authMain">
    <header class="head">
      <a class="brand" href="index.html">
        <span class="kicker">Imagine</span>
        <span class="city">Davao</span>
      </a>
      <div class="head-actions">
        <nav class="head-nav">
          <a href="signin.html">Sign In</a>
          <a href="index.html">Home</a>
        </nav>
        <div class="auth-corner" aria-label="Authentication links">
          <a class="auth-corner-link" href="signin.html">Login</a>
          <a class="auth-corner-link" href="signin.html?mode=signup">Sign Up</a>
        </div>
      </div>
    </header>

    <section class="panel">
      <h1>Reset your password</h1>
      <p class="muted">Enter your account email and we will send a password reset link.</p>
      <article class="card">
        <label>Email address <input id="forgotPasswordEmail" name="email" type="email" autocomplete="email" spellcheck="false" placeholder="Email address&hellip;" /></label>
        <div class="actions">
          <button class="btn" id="sendResetBtn" type="button">Send reset link</button>
          <a class="btn ghost block-link" href="signin.html">Back to login</a>
        </div>
        <p class="status" id="forgotPasswordStatus" aria-live="polite"></p>
      </article>
    </section>
  </main>

  <script src="api-client.js"></script>
  <script src="forgot-password.js"></script>
</body>
</html>
