<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Imagine Davao</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <a class="skip-link" href="#authMain">Skip to main content</a>
  <main class="shell shell-narrow" id="authMain">
    <header class="head">
      <a class="brand" href="index.html">
        <span class="kicker">Imagine</span>
        <span class="city">Davao</span>
      </a>
      <div class="head-actions">
        <nav class="head-nav">
          <a href="signin.html">Sign In</a>
          <a href="index.html">Home</a>
        </nav>
        <div class="auth-corner" aria-label="Authentication links">
          <a class="auth-corner-link" href="signin.html">Login</a>
          <a class="auth-corner-link" href="signin.html?mode=signup">Sign Up</a>
        </div>
      </div>
    </header>

    <section class="panel">
      <h1>Set a new password</h1>
      <p class="muted">Create a new password for your Imagine Davao account.</p>
      <article class="card">
        <label>New password <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" /></label>
        <label>Confirm new password <input id="confirmNewPassword" name="confirmNewPassword" type="password" autocomplete="new-password" /></label>
        <div class="actions">
          <button class="btn" id="updatePasswordBtn" type="button">Update password</button>
          <a class="btn ghost block-link" href="signin.html">Back to sign in</a>
        </div>
        <p class="status" id="resetPasswordStatus" aria-live="polite"></p>
      </article>
    </section>
  </main>

  <script src="api-client.js"></script>
  <script src="reset-password.js"></script>
</body>
</html>
