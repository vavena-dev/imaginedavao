<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | ImaginePhilippines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="account.css" />
</head>
<body>
  <a class="skip-link" href="#authMain">Skip to main content</a>
  <main class="shell shell-narrow" id="authMain">
    <header class="head">
      <a class="brand" href="index.html">
        <span class="kicker">Imagine</span>
        <span class="city">Davao</span>
      </a>
      <div class="head-actions">
        <nav class="head-nav">
          <a href="index.html">Home</a>
          <a href="booking.html">Book</a>
        </nav>
        <div class="auth-corner" aria-label="Authentication links">
          <a class="auth-corner-link is-active" href="signin.html">Login</a>
          <a class="auth-corner-link" href="signin.html?mode=signup">Sign Up</a>
        </div>
      </div>
    </header>

    <section class="panel">
      <h1 id="authTitle">Sign in or create an account</h1>
      <p class="muted signin-intro" id="authIntro">Continue with your email and password.</p>

      <article class="card signin-card">
        <label>Email address <input id="signInEmail" name="email" type="email" autocomplete="email" spellcheck="false" placeholder="Enter your email&hellip;" /></label>
        <label>Password
          <span class="password-field">
            <input id="signInPassword" name="password" type="password" autocomplete="current-password" placeholder="Enter your password&hellip;" />
            <button class="password-visibility-btn" id="passwordVisibilityBtn" type="button" aria-label="Show password" aria-pressed="false">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </span>
        </label>

        <div class="actions">
          <button class="btn" id="continueEmailBtn" type="button">Sign in</button>
          <button class="btn ghost" id="createAccountBtn" type="button">Sign up</button>
        </div>

        <div class="actions actions-split">
          <a class="btn ghost block-link btn-inline-link" id="forgotPasswordLink" href="forgot-password.html">Forgot your password?</a>
        </div>

        <p class="status" id="signInStatus" aria-live="polite"></p>
      </article>
    </section>
  </main>

  <script src="api-client.js"></script>
  <script src="signin.js"></script>
</body>
</html>
