<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | ImaginePhilippines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="account.css" />
</head>
<body>
  <main class="shell shell-narrow">
    <header class="head">
      <a class="brand" href="index.html">
        <span class="kicker">ImaginePhilippines</span>
        <span class="city">Sign In</span>
      </a>
      <nav class="head-nav">
        <a href="index.html">Home</a>
        <a href="booking.html">Book</a>
      </nav>
    </header>

    <section class="panel">
      <h1>Sign in or create an account</h1>
      <p class="muted">Sign in with email now. Social login options are prepared for future activation.</p>

      <article class="card">
        <label>Email address <input id="signInEmail" type="email" autocomplete="email" /></label>
        <label>Password <input id="signInPassword" type="password" autocomplete="current-password" /></label>
        <div class="actions">
          <button class="btn" id="continueEmailBtn" type="button">Continue with email</button>
          <button class="btn ghost" id="createAccountBtn" type="button">Create account</button>
        </div>
        <p class="status" id="signInStatus" aria-live="polite"></p>
      </article>

      <article class="card">
        <p class="muted">Or use one of these options</p>
        <div class="social-grid">
          <button class="social-btn" type="button" id="googleBtn">Google</button>
          <button class="social-btn" type="button" id="facebookBtn">Facebook</button>
          <button class="social-btn" type="button" id="linkedinBtn">LinkedIn</button>
        </div>
      </article>
    </section>
  </main>

  <script src="api-client.js"></script>
  <script src="signin.js"></script>
</body>
</html>
